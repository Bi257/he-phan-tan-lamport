<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Đặt Vé Phân Tán - UED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        .seat { width: 30px; height: 30px; margin: 2px; border-radius: 4px; font-size: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .seat-avail { background: #1e293b; border: 1px solid #334155; color: #94a3b8; }
        .seat-booked { background: #ef4444; color: #fff; cursor: not-allowed; }
        .seat-mine { background: #22c55e !important; color: #fff; }
        .seat-sel { outline: 2px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-slate-800 pb-4 flex justify-between">
            <h1 class="text-2xl font-black text-blue-500 uppercase">Airline Distributed</h1>
            <div id="stt" class="text-[10px] font-bold text-red-500 uppercase px-2 py-1 bg-red-900/20 rounded">Mất kết nối</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 h-fit">
                <h2 class="font-bold mb-4 text-sm text-blue-400">Chọn ghế Client</h2>
                <select id="srv" class="w-full bg-slate-800 border border-slate-700 p-2 rounded text-xs mb-4">
                    <option value="0">HÀ NỘI</option><option value="1">SÀI GÒN</option><option value="2">SINGAPORE</option><option value="3">TOKYO</option><option value="4">NEW YORK</option>
                </select>
                <div id="client-grid" class="grid grid-cols-4 gap-1 mb-4"></div>
                <button id="btn" class="w-full bg-blue-600 py-2 rounded-lg font-bold text-sm">ĐẶT VÉ</button>
            </div>
            <div class="lg:col-span-3 grid grid-cols-5 gap-2" id="nodes"></div>
        </div>
        <div id="log" class="mt-6 bg-slate-900 p-4 rounded border border-slate-800 h-32 overflow-y-auto font-mono text-[10px] text-slate-500"></div>
    </div>

    <script>
        const LOCS = ["HANOI", "SAIGON", "SINGAPORE", "TOKYO", "NEW YORK"];
        let clocks = [0,0,0,0,0], stomp = null, myId = Math.floor(Math.random()*999), sel = null;

        function init() {
            LOCS.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = "bg-slate-900 border border-slate-800 rounded p-2";
                d.innerHTML = `<div class="flex justify-between text-[9px] mb-2 font-bold uppercase"><span>${c}</span><span id="c-${i}" class="text-blue-500">0</span></div><div class="grid grid-cols-3 gap-1" id="g-${i}"></div>`;
                document.getElementById('nodes').appendChild(d);
                for(let s=0; s<9; s++) {
                    const b = document.createElement('div'); b.id = `n-${i}-s-${s}`; b.className = "seat seat-avail"; b.innerText = s+1;
                    document.getElementById(`g-${i}`).appendChild(b);
                }
            });
            render();
            stomp = Stomp.over(new SockJS('/ws'));
            stomp.debug = null;
            stomp.connect({}, () => {
                document.getElementById('stt').innerText = "Trực tuyến";
                document.getElementById('stt').className = "text-[10px] font-bold text-green-500 uppercase px-2 py-1 bg-green-900/20 rounded";
                stomp.subscribe('/topic/updates', (r) => {
                    const d = JSON.parse(r.body);
                    clocks.forEach((c, i) => {
                        clocks[i] = Math.max(clocks[i], d.clock) + 1;
                        document.getElementById(`c-${i}`).innerText = clocks[i];
                        const s = document.getElementById(`n-${i}-s-${d.seatId}`);
                        if(d.status === "SUCCESS") s.className = (d.serverId === i && d.clientId === myId) ? "seat seat-mine" : "seat seat-booked";
                    });
                    const l = document.createElement('div'); l.innerText = `[Clock ${d.clock}] ${LOCS[d.serverId]} đã đặt ghế A${d.seatId+1}`;
                    document.getElementById('log').insertBefore(l, document.getElementById('log').firstChild);
                });
            });
        }

        function render() {
            const g = document.getElementById('client-grid'); g.innerHTML = '';
            for(let i=0; i<9; i++) {
                const s = document.createElement('div');
                s.className = `seat seat-avail ${sel===i?'seat-sel':''}`;
                s.innerText = i+1; s.onclick = () => { sel=i; render(); };
                g.appendChild(s);
            }
        }

        document.getElementById('btn').onclick = () => {
            if(sel === null) return;
            const id = parseInt(document.getElementById('srv').value);
            clocks[id]++;
            stomp.send("/app/book", {}, JSON.stringify({serverId: id, seatId: sel, clock: clocks[id], clientId: myId}));
        };
        init();
    </script>
</body>
</html>
